<svg width="1000" height="900" viewBox="0 0 1000 900" xmlns="http://www.w3.org/2000/svg">

  <!-- ===== STYLES ===== -->
  <style>
    .light { display: block; }
    .dark { display: none; }

    @media (prefers-color-scheme: dark) {
      .light { display: none; }
      .dark { display: block; }
    }
  </style>

  <!-- ===== DEFINITIONS ===== -->
  <defs>
    <!-- Light -->
    <linearGradient id="bgGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF7"/>
      <stop offset="100%" stop-color="#F5EEDC"/>
